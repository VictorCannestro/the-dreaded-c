---
:project:
  :build_root: build
  :release_build: TRUE
  :test_file_prefix: test_
  :default_tasks:
    - test:all
    - release

:paths:
  :test:
    - tests/**
  :source:
    - src/**
  :include:
    - include/**

:defines:
  :test:
    - TEST
  :release: []

:release_build:
  :output: tictactoe.exe

:flags:
  :test:
    :compilie:
      :*:
        - -std=c99
        - -Wall
        - -Wextra
  :release:
    :compile:
      - -std=c99
      - -Wall
      - -Wextra
      - -O2

:plugins:
  :enabled:
    - report_tests_pretty_stdout
    - module_generator
    - report_tests_log_factory
